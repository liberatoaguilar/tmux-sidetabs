# tmux-sidetabs: sidebar-focused window-management keys.
#
# Each key acts only when the focused pane IS a sidetab (#{@is_sidetab}==1).
# Otherwise the key is passed straight through to the focused pane with
# send-keys, so shells and vim keep their native behavior (e.g. C-r reverse
# search, C-n completion). No vim special-casing is needed precisely because the
# fall-through is send-keys, not a tmux action.

# C-n: new window (prompt for a name; press Enter with no text for unnamed)
bind -n C-n if-shell -F "#{==:#{@is_sidetab},1}" {
  command-prompt -p "window name:" { new-window -n "%%" }
} {
  send-keys C-n
}

# C-r: rename the current window (prefilled with its current name)
bind -n C-r if-shell -F "#{==:#{@is_sidetab},1}" {
  command-prompt -I "#W" -p "rename window:" { rename-window -- "%%" }
} {
  send-keys C-r
}

# C-x: kill the current window (with confirmation)
bind -n C-x if-shell -F "#{==:#{@is_sidetab},1}" {
  confirm-before -p "kill window \"#W\"? (y/n)" kill-window
} {
  send-keys C-x
}

# M-k / M-j: move the current window up / down in the list (reorder).
# renumber-windows keeps the indices contiguous afterward.
bind -n M-k if-shell -F "#{==:#{@is_sidetab},1}" {
  swap-window -d -t -1
} {
  send-keys M-k
}
bind -n M-j if-shell -F "#{==:#{@is_sidetab},1}" {
  swap-window -d -t +1
} {
  send-keys M-j
}
